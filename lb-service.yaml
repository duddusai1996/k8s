apiVersion: v1
kind: Service
metadata:
  name: nginx-lb
spec:
  containers:
  - name: nginx
    image: nginx:latest
  type: LoadBalancer
  selector:
    # labels are used as selectors
    project: roboshop
    component: frontend
    environment: dev
  ports:
  - protocol: TCP
    port: 80 # servie port
    targetPort: 80 # container port
    nodePort: 30120