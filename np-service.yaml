apiVersion: v1
kind: Service
metadata:
  name: nginx-np
spec:
  type: NodePort
  selector:
    # labels are used as selectors
    project: roboshop
    component: frontend
    environment: Dev
  ports:
  - protocol: TCP
    port: 80 # servie port
    targetPort: 80 # container port
    nodePort: 32141 
