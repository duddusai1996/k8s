# spot-cluster.yaml

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: Roboshop
  region: us-east-1

managedNodeGroups:
- name: spot
  #instanceTypes: ["c3.large","c4.large","c5.large","c5d.large","c5n.large","c5a.large"]
  # AWS Free tier
  instanceTypes: ["t2.micro","t3.micro"]
  spot: true
  desiredCapacity: 2

